<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mandskab - WebSpejd</title>
    <link rel="stylesheet" type="text/css" href="/assets/css/mandskabStyle.css">
    <link rel="stylesheet" type="text/css" href="/assets/css/master.css">
</head>

<body style="background-color: rgb(51, 51, 51);">
    <header>
        <h1 id="locationNameHeader">Indlæser...</h1>
        <div class="actions">
            <button id="undoButton" class="action" onclick="mandskab.undoLastAction()" disabled>Fortryd</button>
            <button type="button" class="action logout" onclick="location.href='/logout'">Log ud</button>
        </div>
    </header>

    <main>
        <section class="location-selector">
            <label for="nextLocationSelector">Næste post:</label>
            <select id="nextLocationSelector">
                <option value="">Indlæser...</option>
            </select>
        </section>
        
        <section class="patrol-section">
            <h2>Patrulje på post</h2>
            <div id="listPåPost" class="patrol-list">
                <!-- Patrols on location will be populated here -->
            </div>
        </section>

        <section class="patrol-section">
            <h2>Patrulje på vej</h2>
            <div id="listPåVej" class="patrol-list">
                <!-- Patrols towards location will be populated here -->
            </div>
        </section>

        <section class="recent-actions">
            <h2>Seneste handlinger</h2>
            <table id="recentActionsTable">
                <thead>
                    <tr>
                        <th>Tid</th>
                        <th>Patrulje</th>
                        <th>Handling</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- Recent actions will be populated here if needed -->
                </tbody>
            </table>
        </section>
    </main>

    <!-- Load dependencies -->
    <script type="module" src="/js/sendHTTPRequest.js"></script>
    <script type="module" src="/js/mandskab.js"></script>
</body>
</html>
